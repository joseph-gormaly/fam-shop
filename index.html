<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Family Shopping List</title>
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:system-ui,sans-serif; background:#0f172a; color:#f8fafc;
           min-height:100vh; padding:1.2rem 1rem 3rem; max-width:560px; margin:0 auto; }
    h1 { font-size:1.5rem; margin:0 0 .2rem; }
    .sub { color:#64748b; font-size:.8rem; margin-bottom:1.2rem; }
    ul { list-style:none; padding:0; margin:0; }
    li { display:flex; align-items:center; gap:.7rem; background:#1e293b; border-radius:.7rem;
         padding:.8rem 1rem; margin-bottom:.55rem; }
    li.checked { opacity:.45; }
    li.checked .name { text-decoration:line-through; }
    .box { width:24px; height:24px; border-radius:.5rem; border:2px solid #475569;
           flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:.95rem; }
    li.checked .box { background:#22c55e; border-color:#22c55e; color:#04240f; }
    .name { flex:1; font-size:1.05rem; }
    .qty { color:#94a3b8; font-size:.9rem; margin-left:.3rem; }
    .count { color:#64748b; font-size:.85rem; margin-top:1rem; }
    .empty { color:#475569; font-style:italic; text-align:center; padding:2rem 0; }
    .note { color:#475569; font-size:.72rem; margin-top:1.5rem; text-align:center; }
  </style>
</head>
<body>
  <h1>🛒 Family Shopping List</h1>
  <div class="sub">view-only · updates automatically · edit at home on the family hub</div>
  <ul id="list"></ul>
  <p class="empty" id="empty" style="display:none">List is empty.</p>
  <div class="count" id="count"></div>
  <div class="note">Live from the family hub. Add &amp; tick items on the home network.</div>

<script>
  // ── Fill these two in (see deploy steps) ──
  const SB_URL = "https://bpldjytxoxlztlujmvzr.supabase.co";
  const SB_KEY = "PASTE_YOUR_PUBLISHABLE_KEY_HERE";   // Settings → API Keys → publishable

  const list = document.getElementById('list');
  function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  async function load() {
    try {
      const r = await fetch(
        `${SB_URL}/rest/v1/shopping_items?select=*&order=checked.asc,created_at.asc`,
        { headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY } });
      const items = await r.json();
      list.innerHTML = '';
      (items || []).forEach(it => {
        const li = document.createElement('li');
        if (it.checked) li.className = 'checked';
        li.innerHTML =
          `<div class="box">${it.checked ? '✓' : ''}</div>
           <span class="name">${esc(it.name)}${it.qty ? `<span class="qty">${esc(it.qty)}</span>` : ''}</span>`;
        list.appendChild(li);
      });
      const open = (items || []).filter(i => !i.checked).length;
      document.getElementById('count').textContent =
        items.length ? `${open} to get · ${items.length - open} ticked` : '';
      document.getElementById('empty').style.display = items.length ? 'none' : 'block';
    } catch (e) { /* keep last view */ }
  }
  load();
  setInterval(load, 10000);
</script>
</body>
</html>
